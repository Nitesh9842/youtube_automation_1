<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered YouTube automation platform. Upload, edit, and publish videos with AI-generated metadata.">
    <title>{% block title %}AutoTube AI{% endblock %} — AI Video Platform</title>
    {% if google_site_verification %}
    <meta name="google-site-verification" content="{{ google_site_verification }}" />
    {% endif %}
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%238b5cf6'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white'>▶</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body data-page="{% block page_id %}{% endblock %}">
    <div id="toast-container" class="toast-container"></div>
    {% block body %}{% endblock %}
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

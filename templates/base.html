<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & Metadata -->
    <meta name="description" content="{% block meta_description %}AI-powered YouTube automation platform. Upload, edit, and publish videos with AI-generated metadata.{% endblock %}">
    <meta name="keywords" content="Insta Reel to YouTube, Auto Upload YouTube, YouTube Automation, AI Video Editor, AutoTube AI, Manage Channel Uploads, Instagram to YouTube AI Edits, YouTube Upload Bot, Video Metadata Generator, AI Metadata">
    <title>{% block title %}AutoTube AI{% endblock %}</title>
    
    <!-- Canonical URL -->
    <link rel="canonical" href="{% block canonical_url %}https://autotubeai.me{{ request.path }}{% endblock %}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{% block og_url %}https://autotubeai.me{{ request.path }}{% endblock %}">
    <meta property="og:title" content="{% block og_title %}AutoTube AI — Insta Reel to YouTube Auto Upload with AI Edits{% endblock %}">
    <meta property="og:description" content="{% block og_description %}AI-powered YouTube automation platform. Upload, edit, and publish videos with AI-generated metadata.{% endblock %}">
    <meta property="og:image" content="https://autotubeai.me/static/img/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://autotubeai.me{{ request.path }}">
    <meta property="twitter:title" content="{% block twitter_title %}AutoTube AI — Insta Reel to YouTube Auto Upload with AI Edits{% endblock %}">
    <meta property="twitter:description" content="{% block twitter_description %}AI-powered YouTube automation platform. Upload, edit, and publish videos with AI-generated metadata.{% endblock %}">
    <meta property="twitter:image" content="https://autotubeai.me/static/img/logo.png">

    {% if google_site_verification %}
    <meta name="google-site-verification" content="{{ google_site_verification }}" />
    {% endif %}
    
    <!-- Icons & Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body data-page="{% block page_id %}{% endblock %}">
    <div id="toast-container" class="toast-container"></div>
    {% block body %}{% endblock %}
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
